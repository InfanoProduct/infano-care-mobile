name: infano_care_mobile
description: "Infano.Care — Your Journey. Your Power. Your Safe Space."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State management & DI
  flutter_bloc: ^9.1.0
  equatable: ^2.0.5
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Navigation
  go_router: ^14.6.2

  # Networking
  dio: ^5.8.0+1

  # Storage
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # UI & Fonts
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.2

  # Animations
  lottie: ^3.3.1

  # SVG
  flutter_svg: ^2.0.17

  # OTP input
  pin_code_fields: ^8.0.1

  # Date formatting
  intl: ^0.20.2

  # Functional programming
  fpdart: ^1.1.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  injectable_generator: ^2.6.2
  freezed: ^2.5.7
  json_serializable: ^6.9.3
  build_runner: ^2.4.15
  flutter_native_splash: ^2.4.4

flutter_native_splash:
  color: "#6D28D9"
  android: true
  ios: true
  android_gravity: center
  android_12:
    image: assets/logo_padded.png
    color: "#6D28D9"
  web: false

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/logo_padded.png
